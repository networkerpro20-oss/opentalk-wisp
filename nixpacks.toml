[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = [
  'corepack enable',
  'corepack prepare pnpm@8.15.0 --activate',
  'pnpm install --frozen-lockfile'
]

[phases.build]
cmds = [
  'cd apps/backend && pnpm prisma generate && pnpm build'
]

[start]
cmd = 'cd apps/backend && pnpm prisma migrate deploy && node dist/main.js'
