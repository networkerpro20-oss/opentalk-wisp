services:
  # Backend API
  - type: web
    name: opentalk-wisp-backend
    runtime: node
    plan: starter
    region: oregon
    buildCommand: cd apps/backend && pnpm install && pnpm prisma:migrate:deploy && pnpm build
    startCommand: cd apps/backend && pnpm start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: opentalk-wisp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: opentalk-wisp-redis
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: opentalk-wisp-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: opentalk-wisp-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /api/health

  # Redis for Bull Queue
  - type: redis
    name: opentalk-wisp-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: opentalk-wisp-db
    databaseName: opentalkwisp
    plan: starter
    region: oregon
